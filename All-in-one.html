<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Byte AI 2.85 Killo DAT - Knowledge Bot with Wikipedia Learning">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Byte AI">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23000' width='192' height='192'/><rect x='24' y='24' width='48' height='48' fill='%2300ff00'/><rect x='108' y='24' width='48' height='48' fill='%2300ff00' opacity='0.6'/><rect x='24' y='108' width='48' height='48' fill='%2300ff00' opacity='0.6'/><rect x='108' y='108' width='48' height='48' fill='%2300ff00'/></svg>">
    <title>Byte AI 3.0 "Mega" (DAT)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Courier New', monospace;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #000;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #1a4d2e;
            background: #000;
        }

        .header-left {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
            filter: drop-shadow(0 0 6px rgba(0, 255, 0, 0.3));
        }

        .app-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .mode-switch {
            background: none;
            border: none;
            color: #00ff00;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .mode-switch:hover {
            background: rgba(0, 255, 0, 0.1);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #fff;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #555;
            border: 2px solid #00ff00;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #000;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Message Styles */
        .message {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.user .label {
            order: 2;
        }

        .message.user .bubble {
            order: 1;
        }

        .message.bot .label {
            order: 1;
        }

        .message.bot .bubble {
            order: 2;
        }

        .label {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            min-width: 40px;
            text-align: center;
            font-style: italic;
        }

        .bubble {
            max-width: 60%;
            padding: 12px 20px;
            border-radius: 24px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 15px;
        }

        .message.bot .bubble {
            background: linear-gradient(135deg, #2d5a3d 0%, #1a4d2e 100%);
            color: #fff;
            border: 1px solid #00ff00;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #000;
            font-weight: 500;
        }

        /* Input Area */
        .input-area {
            padding: 16px 24px 24px;
            background: #000;
            border-top: 1px solid #1a4d2e;
        }

        #queryInput {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #1a4d2e;
            border-radius: 24px;
            background: rgba(26, 77, 46, 0.5);
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s, background 0.2s;
        }

        #queryInput::placeholder {
            color: #666;
            font-style: italic;
        }

        #queryInput:focus {
            outline: none;
            border-color: #00ff00;
            background: rgba(26, 77, 46, 0.8);
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.2);
        }

        /* Scrollbar Styling */
        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #000;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #1a4d2e;
            border-radius: 3px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #2d5a3d;
        }

        /* Loading Animation */
        .loading {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .loading span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.5;
            }
            40% {
                opacity: 1;
            }
        }


        /* Update Notification Banner */
        .update-banner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, #1a4d2e 0%, #2d5a3d 100%);
            border-bottom: 2px solid #00ff00;
            padding: 12px 20px;
            z-index: 999;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .update-banner.show {
            display: flex;
        }

        .update-text {
            color: #00ff00;
            font-size: 14px;
            flex: 1;
        }

        .update-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .update-btn:hover {
            background: #00cc00;
            transform: scale(1.05);
        }

        .update-close {
            background: none;
            border: none;
            color: #00ff00;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }

            .app-title {
                font-size: 16px;
            }

            .chat-area {
                padding: 16px;
            }

            .bubble {
                max-width: 85%;
            }

            .input-area {
                padding: 12px 16px 16px;
            }
        }
    </style>
</head>

            }

            return query;
        }

        async function learnFromWikipedia(query) {
            // Use context-aware query if needed
            const contextQuery = buildContextQuery(query);
            const cacheKey = contextQuery.toLowerCase().replace(/\s+/g, '_').replace(/[()]/g, '');

            // Check cache first
            if (cacheKey in datCache) {
                return datCache[cacheKey];
            }

            try {
                // Use Wikipedia REST API (better CORS support)
                const title = encodeURIComponent(contextQuery);
                const restUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${title}`;

                const res = await fetch(restUrl, {
                    method: 'GET',
                    headers: { 'User-Agent': getNextAgent() }
                });

                if (res.status === 404) {
                    console.warn('Wikipedia: Article not found:', query);
                    return null;
                }
                if (!res.ok) throw new Error(`Wikipedia API failed: ${res.status}`);

                const data = await res.json();
                const extract = data.extract;
                const actualTitle = data.title;

                if (!extract) {
                    console.warn('Wikipedia: No extract found for:', actualTitle);
                    return null;
                }

                console.log('Wikipedia: Got extract, extracting sentences...');

                // Extract sentences
                const sentences = [];
                const paragraphs = extract.split('\n\n');

                for (const para of paragraphs) {
                    if (para.length < 20) continue;
                    const sent = para.split(/(?<=[.!?])\s+/);

                    for (const s of sent) {
                        if (s.length > 10 && s.length < 300) {
                            if (!s.startsWith('See also') && !s.startsWith('References')) {
                                sentences.push(s);
                                if (sentences.length >= 5) break;
                            }
                        }
                    }
                    if (sentences.length >= 5) break;
                }

                if (sentences.length === 0) return null;

                // Cache result
                const result = { title: actualTitle, sentences, learned_at: new Date().toISOString() };
                datCache[cacheKey] = result;
                localStorage.setItem(DAT_CACHE_KEY, JSON.stringify(datCache));

                return result;
            } catch (error) {
                console.error('Wikipedia error:', error);
                return null;
            }
        }

        // Send message
        async function sendMessage() {
            const message = queryInput.value.trim();
            if (!message) return;

            queryInput.value = '';
            queryInput.focus();

            // Add user message
            addMessage(message, 'user');

            // Show loading
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot';
            loadingDiv.innerHTML = '<div class="label">Byte</div><div class="bubble"><div class="loading"><span></span><span></span><span></span></div></div>';
            messagesDiv.appendChild(loadingDiv);
            scrollToBottom();

            try {
                // 1. Simple response
                let response = checkSimpleResponse(message);
                if (!response) {
                    response = getTimeDate(message);
                }

                if (response) {
                    loadingDiv.remove();
                    addMessage(response, 'bot');
                } else {
                    // 2. Wikipedia DAT
                    const learned = await learnFromWikipedia(message);
                    loadingDiv.remove();

                    if (learned) {
                        const answer = formatResponse(learned.sentences.join('\n\n'));
                        addMessage(answer, 'bot');
                    } else {
                        addMessage("❌ I don't know that. Try asking something else!", 'bot');
                    }
                }
            } catch (error) {
                loadingDiv.remove();
                addMessage('❌ Error: ' + error.message, 'bot');
            }

            scrollToBottom();
        }

        // Add message to chat

        function formatResponse(text) {
            // Auto-format lists from Wikipedia (MAC may refer to:, etc)
            const lines = text.split('\n');
            let result = [];
            let i = 0;

            while (i < lines.length) {
                const line = lines[i].trim();
                
                // Check for list headers like "X may refer to:", "X includes:", etc
                if (/may refer to:|can mean:|include[s]?:|^.+:$/.test(line) && i + 1 < lines.length) {
                    const nextLine = (lines[i + 1] || '').trim();
                    
                    // Check if next line looks like a list item (not a continuation)
                    if (nextLine && !nextLine.match(/^[a-z]/) && nextLine.length > 0) {
                        result.push(line);
                        
                        // Collect list items
                        let itemNum = 1;
                        i++;
                        while (i < lines.length) {
                            const item = lines[i].trim();
                            if (!item) {
                                // Empty line might end list
                                i++;
                                if (i < lines.length && !lines[i].trim()) break;
                                continue;
                            }
                            if (/^[a-z]/.test(item) || item.match(/^The /)) {
                                // Looks like prose, not a list
                                break;
                            }
                            result.push(`${itemNum}. ${item}`);
                            itemNum++;
                            i++;
                        }
                        continue;
                    }
                }
                
                result.push(line);
                i++;
            }

            return result.join('\n');
        }

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = type === 'user' ? 'You' : 'Byte';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;

            messageDiv.appendChild(label);
            messageDiv.appendChild(bubble);
            messagesDiv.appendChild(messageDiv);
        }

        function scrollToBottom() {
            setTimeout(() => {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }, 0);
        }

        // Event listeners
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Welcome message
        window.addEventListener('load', () => {
            addMessage("Hi! I'm Killo 2.85 DAT\n\nTry: math expressions, \"what time is it\", or ask me anything!", 'bot');
            queryInput.focus();
        });
    </script>


    <script>
        const APP_VERSION = '3.0.0';

        // Handle service worker updates
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data.type === 'UPDATE_AVAILABLE') {
                    console.log('Update available:', event.data.version);
                    showUpdateBanner();
                }
            });

            // Register service worker
            navigator.serviceWorker.register('service-worker.js').then(reg => {
                console.log('Service Worker registered ✓');

                // Check for updates every 5 minutes
                setInterval(() => {
                    if (reg.controller) {
                        reg.controller.postMessage({ type: 'CHECK_UPDATE' });
                    }
                }, 5 * 60 * 1000);

                // Check for updates on page load
                if (reg.controller) {
                    reg.controller.postMessage({ type: 'CHECK_UPDATE' });
                }
            }).catch(err => {
                console.log('Service Worker registration failed:', err);
            });
        }

        function showUpdateBanner() {
            const banner = document.getElementById('updateBanner');
            if (banner) {
                banner.classList.add('show');
            }
        }

        function dismissUpdate() {
            const banner = document.getElementById('updateBanner');
            if (banner) {
                banner.classList.remove('show');
            }
        }

        function updateApp() {
            // Clear all caches to force fresh download
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => caches.delete(name));
                });
            }
            // Reload the page
            window.location.reload(true);
        }
    </script>
